steps:
  # Build the app image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:$COMMIT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Build the worker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:$COMMIT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:latest'
      - '-f'
      - 'Dockerfile.worker'
      - '.'

  # Push app image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:latest']

  # Push worker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:latest']

  # Run Prisma migrations
  # The runner image only ships @prisma/client, not the prisma CLI, so a bare
  # `npx prisma` fetches latest from the registry (currently a Prisma 7 major
  # that dropped schema.prisma's datasource.url) instead of our pinned 5.22.0.
  # Cloud Build steps also don't get Cloud Run's automatic Cloud SQL Auth Proxy
  # socket, so start one ourselves at the same /cloudsql/<instance> path that
  # DATABASE_URL's ?host= param already points at.
  - name: 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:$COMMIT_SHA'
    entrypoint: 'sh'
    args:
      - -c
      - |
        set -e
        apk add --no-cache curl
        curl -sLo /tmp/cloud-sql-proxy https://github.com/GoogleCloudPlatform/cloud-sql-proxy/releases/latest/download/cloud-sql-proxy.linux.amd64
        chmod +x /tmp/cloud-sql-proxy
        mkdir -p /cloudsql
        /tmp/cloud-sql-proxy --unix-socket=/cloudsql $PROJECT_ID:us-east1:salefunnel-db &
        PROXY_PID=$$!
        for i in $(seq 1 30); do
          [ -S "/cloudsql/$PROJECT_ID:us-east1:salefunnel-db/.s.PGSQL.5432" ] && break
          sleep 1
        done
        npx prisma@5.22.0 migrate deploy
        kill $$PROXY_PID
    secretEnv: ['DATABASE_URL']

  # Deploy app to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - salefunnel-app
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:$COMMIT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=4'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=3000'
      - '--add-cloudsql-instances=$PROJECT_ID:us-east1:salefunnel-db'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--set-env-vars=NODE_ENV=production'

  # NEXTAUTH_URL must match the live Cloud Run URL for OAuth callbacks to work,
  # but that URL only exists after the first deploy above — so fetch it and set
  # it as a follow-up update rather than hardcoding a guess.
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        URL=$(gcloud run services describe salefunnel-app --region=us-east1 --format='value(status.url)')
        gcloud run services update salefunnel-app --region=us-east1 --set-env-vars=NEXTAUTH_URL=$${URL},NODE_ENV=production

  # Deploy worker to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - salefunnel-worker
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:$COMMIT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--add-cloudsql-instances=$PROJECT_ID:us-east1:salefunnel-db'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest'
      - '--set-env-vars=NODE_ENV=production'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/app:$COMMIT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/salefunnel/worker:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
